<div class="container mt-2">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Url List</h2>

    <app-button
      label="Add Urls"
      type="primary"
      [routerLink]="['/url-shortner/create']">
    </app-button>

  </div>

  <mat-form-field appearance="outline" class="w-100 mb-2">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput placeholder="Search urls" (input)="onSearch($any($event.target).value)">
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 w-100">

    <ng-container matColumnDef="slug">
      <th mat-header-cell *matHeaderCellDef> Slug </th>
      <td mat-cell *matCellDef="let row"> {{row.slug}} </td>
    </ng-container>

    <ng-container matColumnDef="destinationUrl">
      <th mat-header-cell *matHeaderCellDef> DestinationUrl </th>
      <td mat-cell *matCellDef="let row"> {{row.destinationUrl}} </td>
    </ng-container>

       <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef> CreatedAt </th>
      <td mat-cell *matCellDef="let row"> {{row.createdAt}} </td>
    </ng-container>



    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let row">

        <app-button
          label="Edit"
          class="me-2"
          type="primary"
          [routerLink]="['/roles/edit', row.id]">
        </app-button>

        <app-button
          label="Delete"
          type="danger"
          (click)="delete(row.id)">
        </app-button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>

  <div *ngIf="dataSource?.data?.length === 0" class="text-center mt-3">
    No roles found
  </div>

</div>
