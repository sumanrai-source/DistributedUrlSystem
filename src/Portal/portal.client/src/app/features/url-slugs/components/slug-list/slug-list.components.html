<div class="container mt-2">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Slugs List</h2>

    <app-button
      label="Add Slugs"
      type="primary"
      [routerLink]="['/url-shortner/create']">
    </app-button>

  </div>

  <mat-form-field appearance="outline" class="w-100 mb-2">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput placeholder="Search slugs" (input)="onSearch($any($event.target).value)">
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 w-100">

    <ng-container matColumnDef="slug">
      <th mat-header-cell *matHeaderCellDef> Slugs </th>
      <td mat-cell *matCellDef="let row"> {{row.slug}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let row">
  <span [class.text-success]="row.status === 2"
        [class.text-muted]="row.status !== 2">
    {{ row.status === 2 ? 'Active' : 'Inactive' }}
  </span>
</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let row">

        <app-button
          label="Edit"
          class="me-2"
          type="primary"
          [routerLink]="['/slugs/edit', row.id]">
        </app-button>

        <app-button
          label="Delete"
          type="danger"
          (click)="delete(row.id)">
        </app-button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  

  <mat-paginator [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>

  <div *ngIf="dataSource?.data?.length === 0" class="text-center mt-3">
    No Slugs found
  </div>

</div>
